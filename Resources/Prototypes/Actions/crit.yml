# Actions added to mobs in crit.
- type: entity
  abstract: true
  parent: BaseMentalAction
  id: BaseCritAction
  components:
  - type: Action
    itemIconStyle: NoItem

- type: entity
  parent: BaseCritAction
  id: ActionCritSuccumb
  name: Succumb
  description: Cease holding on and allow your soul to break from your body.
  components:
  - type: Action
    startDelay: true
    useDelay: 10
    icon:
      sprite: Mobs/Ghosts/ghost_human.rsi
      state: icon
  - type: InstantAction
    event: !type:CritSuccumbEvent

- type: entity
  parent: BaseCritAction
  id: ActionCritFakeDeath
  name: Feign Death
  description: Pretend to take your final breath while remaining alive.
  components:
  - type: Action
    useDelay: 30
    icon:
      sprite: Interface/Actions/actions_crit.rsi
      state: fakedeath
  - type: InstantAction
    event: !type:CritFakeDeathEvent

- type: entity
  parent: ActionCritSuccumb # for use delay
  id: ActionCritLastWords
  name: Dying Words
  description: Expend the last of your energy to whisper your last words to anyone nearby, and then die. You only have 30 characters to work with.
  components:
  - type: Action
    icon:
      sprite: Interface/Actions/actions_crit.rsi
      state: lastwords
  - type: InstantAction
    event: !type:CritLastWordsEvent
